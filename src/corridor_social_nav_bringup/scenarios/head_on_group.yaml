scenario:
  name: head_on_group
  description: "Group of 3 pedestrians walking toward robot spanning corridor width"
  world: corridor_straight.sdf
  robot:
    start: {x: -9.0, y: 0.0, yaw: 0.0}
    goal: {x: 9.0, y: 0.0}
  pedestrians:
    - id: 1
      waypoints: [[9.0, -0.3], [-9.0, -0.3]]
      speed: {mean: 1.0, std: 0.15, min: 0.7, max: 1.3}
      start_delay: {mean: 1.0, std: 0.5, min: 0.0, max: 2.0}
      lateral_offset: {mean: -0.3, std: 0.05, min: -0.5, max: -0.1}
    - id: 2
      waypoints: [[9.0, 0.0], [-9.0, 0.0]]
      speed: {mean: 1.0, std: 0.15, min: 0.7, max: 1.3}
      start_delay: {mean: 1.0, std: 0.3, min: 0.0, max: 2.0}
      lateral_offset: {mean: 0.0, std: 0.05, min: -0.2, max: 0.2}
    - id: 3
      waypoints: [[9.0, 0.3], [-9.0, 0.3]]
      speed: {mean: 1.0, std: 0.15, min: 0.7, max: 1.3}
      start_delay: {mean: 1.5, std: 0.5, min: 0.5, max: 3.0}
      lateral_offset: {mean: 0.3, std: 0.05, min: 0.1, max: 0.5}
  timeout: 60.0
  seed_range: [0, 29]

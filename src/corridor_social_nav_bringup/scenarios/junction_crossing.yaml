scenario:
  name: junction_crossing
  description: "Pedestrian crosses from branch at T-junction while robot traverses main corridor"
  world: corridor_tjunction.sdf
  robot:
    start: {x: -6.5, y: 0.0, yaw: 0.0}
    goal: {x: 6.5, y: 0.0}
  pedestrians:
    - id: 1
      waypoints: [[0.0, 8.0], [0.0, -0.5]]
      speed: {mean: 1.0, std: 0.2, min: 0.6, max: 1.4}
      start_delay: {mean: 2.0, std: 1.0, min: 0.5, max: 4.0}
      lateral_offset: {mean: 0.0, std: 0.15, min: -0.4, max: 0.4}
  timeout: 90.0
  seed_range: [0, 29]

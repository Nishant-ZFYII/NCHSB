# config/ekf_imu_odom.yaml
# Wheel-odom EKF for planar Ackermann car
# NOTE: No IMU sensor exists in the robot model, so only /odom is fused.

ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.5
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false

    # Do NOT use predict_to_current_time — it causes backward time jumps
    # when real measurements arrive after predictions.
    predict_to_current_time: false

    # Offset TF timestamps slightly into the future so they cover
    # sensor timestamps that arrive at the same sim-step.
    transform_time_offset: 0.05

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ============================================================
    # ODOM INPUT (from ackermann_steering_controller)
    # ============================================================
    odom0: /odom

    # Fuse x, y, yaw from pose AND vx, vyaw from twist
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    use_sim_time: true
